<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RsAlpha - 投研 K 线复盘系统</title>

  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background-color: #131722; color: white; }
    #controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
    #chart-container { width: 100%; height: 600px; border: 1px solid #363c4e; border-radius: 4px; }
    input { padding: 8px; border-radius: 4px; border: 1px solid #363c4e; background: #2a2e39; color: white; }
    button { padding: 8px 16px; background: #2962ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1e88e5; }
    .info { color: #b2b5be; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>

<div id="controls">
  <input type="text" id="tickerInput" placeholder="输入标的代码 (如 TSLA)" value="TSLA">
  <button id="loadBtn">加载数据</button>
  <span class="info">※ 数据源自 Discord 频道实时提取</span>
</div>

<div id="chart-container"></div>

<script>
  // 使用 DOMContentLoaded 确保页面加载完毕后再执行所有逻辑
  document.addEventListener('DOMContentLoaded', () => {

      const container = document.getElementById('chart-container');
      if (!container) return;

      // 1. 创建图表实例 (严格按照 4.1.1 语法)
      const chart = LightweightCharts.createChart(container, {
          layout: {
              background: { type: 'solid', color: '#131722' },
              textColor: '#d1d4dc',
          },
          grid: {
              vertLines: { color: '#334158' },
              horzLines: { color: '#334158' },
          },
          timeScale: { borderColor: '#485c7b', timeVisible: true },
      });

      // 2. 添加 K线系列 (这个 API 在 4.1.1 中绝对可用)
      const candleSeries = chart.addCandlestickSeries({
          upColor: '#26a69a',
          downColor: '#ef5350',
          borderVisible: false,
          wickUpColor: '#26a69a',
          wickDownColor: '#ef5350',
      });

      // 3. 核心加载逻辑
      async function loadData() {
          const input = document.getElementById('tickerInput');
          const ticker = input.value.toUpperCase();
          if (!ticker) return;

          console.log(`[RsAlpha] 开始请求数据: ${ticker}`);

          try {
              // A. 获取 K线数据
              const kRes = await fetch(`/api/charts/kline?symbol=${ticker}`);
              const kJson = await kRes.json();

              if (kJson.code === 0 && Array.isArray(kJson.data)) {
                  candleSeries.setData(kJson.data);
              } else {
                  console.warn("[RsAlpha] K线数据异常", kJson);
              }

              // B. 获取投研标注数据
              const mRes = await fetch(`/api/charts/markers?ticker=${ticker}`);
              const mJson = await mRes.json();

              if (mJson.code === 0 && Array.isArray(mJson.data)) {
                  const markers = mJson.data.map(item => {
                      const dateStr = item.timestamp.includes(' ') ? item.timestamp.split(' ')[0] : item.timestamp;
                      return {
                          time: dateStr,
                          position: 'aboveBar',
                          color: (item.user && item.user.includes('猫姐')) ? '#f68410' : '#2196F3',
                          shape: 'circle',
                          text: (item.user || '分析师') + ': ' + (item.content || '').substring(0, 15) + '...',
                      };
                  });

                  // 强制按时间从小到大排序 (核心规避报错机制)
                  markers.sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());

                  // 打点渲染
                  candleSeries.setMarkers(markers);
                  console.log(`[RsAlpha] 成功渲染 ${markers.length} 条标注`);
              }
          } catch (err) {
              console.error("[RsAlpha] 请求或渲染过程发生异常:", err);
          }
      }

      // 4. 事件绑定：点击按钮触发加载
      document.getElementById('loadBtn').addEventListener('click', loadData);

      // 5. 响应式监听
      window.addEventListener('resize', () => {
          chart.resize(container.clientWidth, container.clientHeight);
      });

      // 6. 初始化时自动加载一次数据
      loadData();
  });
</script>
</body>
</html>
