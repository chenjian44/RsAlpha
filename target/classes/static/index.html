<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RsAlpha - 投研 K 线复盘系统</title>

  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

  <style>
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background-color: #ffffff; color: #333333; }
    #controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
    #chart-container { width: 100%; height: 600px; border: 1px solid #e0e3eb; border-radius: 4px; position: relative; }
    input { padding: 8px; border-radius: 4px; border: 1px solid #d1d4dc; background: #ffffff; color: #333333; outline: none; }
    input:focus { border-color: #2962ff; }
    button { padding: 8px 16px; background: #2962ff; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1e88e5; }
    .info { color: #787b86; font-size: 14px; margin-left: 10px; }

    #infoModal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); backdrop-filter: blur(2px); align-items: center; justify-content: center; }
    .modal-content { background-color: #ffffff; padding: 24px; border-radius: 12px; width: 500px; max-width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #e0e3eb; }
    .close-btn { color: #999; float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 24px; transition: color 0.2s; }
    .close-btn:hover { color: #333; }
    .modal-date { font-size: 20px; font-weight: 600; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #f0f3fa; padding-bottom: 12px; color: #191919; }

    .opinion-card { padding: 16px; margin-bottom: 12px; border-radius: 8px; background: #f8f9fa; border-left: 4px solid #ccc; font-size: 14px; line-height: 1.6; color: #333; }
    .opinion-card:last-child { margin-bottom: 0; }
    .opinion-header { font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

    .color-bull { color: #26a69a; }
    .color-neutral { color: #fbc02d; }
    .color-bear { color: #ef5350; }

    .border-bull { border-left-color: #26a69a; }
    .border-neutral { border-left-color: #fbc02d; }
    .border-bear { border-left-color: #ef5350; }
  </style>
</head>
<body>

<div id="controls">
  <input type="text" id="tickerInput" placeholder="输入标的代码 (如 MSFT)" value="MSFT">
  <button id="loadBtn">加载共振数据</button>
  <span class="info">※ K线：红涨绿跌 | 圆点：🟢多 🟡平 🔴空 (点击K线查看详情)</span>
</div>

<div id="chart-container"></div>

<div id="infoModal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <h3 class="modal-date" id="modalTitle">日期</h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {

      const container = document.getElementById('chart-container');
      const modal = document.getElementById('infoModal');
      const closeModal = document.getElementById('closeModal');

      let dailyOpinions = {};

      const chart = LightweightCharts.createChart(container, {
          layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#191919' },
          grid: { vertLines: { color: '#f0f3fa' }, horzLines: { color: '#f0f3fa' } },
          timeScale: { borderColor: '#e0e3eb', timeVisible: true },
      });

      const candleSeries = chart.addCandlestickSeries({
          upColor: '#ef5350', downColor: '#26a69a', borderVisible: false, wickUpColor: '#ef5350', wickDownColor: '#26a69a',
      });

      closeModal.onclick = () => modal.style.display = "none";
      window.onclick = (event) => { if (event.target === modal) modal.style.display = "none"; }

      async function loadData() {
          const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
          if (!ticker) return;
          dailyOpinions = {};

          try {
              const kRes = await fetch(`/api/charts/kline?symbol=${ticker}`);
              const kJson = await kRes.json();
              if (kJson.code === 0 && Array.isArray(kJson.data)) {
                  candleSeries.setData(kJson.data);
              }

              const mRes = await fetch(`/api/charts/markers?ticker=${ticker}`);
              const mJson = await mRes.json();

              if (mJson.code === 0 && Array.isArray(mJson.data)) {
                  const markers = [];

                  mJson.data.forEach(item => {
                      // 1. 提取 YYYY-MM-DD 和具体时间
                      const rawTimestamp = item.timestamp || '';
                      const dateStr = rawTimestamp.length >= 10 ? rawTimestamp.substring(0, 10) : rawTimestamp;
                      const timeStr = rawTimestamp.includes(' ') ? rawTimestamp.split(' ')[1] : '';

                      // 2. 💡 修复：更智能的情绪识别优先级
                      let sentiment = 1;
                      if (item.sentiment_score !== undefined) {
                          sentiment = item.sentiment_score;
                      } else if (item.content) {
                          const contentStr = item.content.toLowerCase();
                          // 优先判断明确的看涨/看跌，防止被“减仓”等行为词汇干扰
                          if (contentStr.includes('看涨') || contentStr.includes('看多')) {
                              sentiment = 1;
                          } else if (contentStr.includes('看跌') || contentStr.includes('看空')) {
                              sentiment = -1;
                          } else if (contentStr.includes('中性') || contentStr.includes('观望') || contentStr.includes('防守')) {
                              sentiment = 0;
                          } else if (contentStr.includes('风险') || contentStr.includes('减仓')) {
                              sentiment = -1;
                          } else if (contentStr.includes('加仓')) {
                              sentiment = 1;
                          }
                      }

                      const cleanUser = (item.user || item.blogger || '分析师').trim();
                      const cleanHorizon = (item.horizon || '未定周期').trim();
                      const cleanContent = (item.content || item.strategy || '').trim();

                      // 💡 3. 终极去重升级：彻底弃用 rawTimestamp！
                      // 仅对“博主名字+文本内容”进行 MD5 加密生成指纹
                      const fingerprint = md5(`${cleanUser}|${cleanContent}`);

                      const newOpinion = {
                          user: cleanUser,
                          horizon: cleanHorizon,
                          content: cleanContent,
                          sentiment: sentiment,
                          time: timeStr,
                          fingerprint: fingerprint // 存入MD5指纹
                      };

                      if (!dailyOpinions[dateStr]) dailyOpinions[dateStr] = [];

                      // 💡 4. 精准 MD5 去重
                      const isExactDuplicate = dailyOpinions[dateStr].some(existing =>
                          existing.fingerprint === fingerprint
                      );

                      if (!isExactDuplicate) {
                          dailyOpinions[dateStr].push(newOpinion);
                      }
                  });

                  // 5. 渲染图表 Markers
                  Object.keys(dailyOpinions).forEach(date => {
                      const opinions = dailyOpinions[date];

                      opinions.forEach(op => {
                          let mColor = '#fbc02d'; // 黄
                          let mPos = 'inBar';
                          if (op.sentiment === 1) { mColor = '#26a69a'; mPos = 'belowBar'; }
                          else if (op.sentiment === -1) { mColor = '#ef5350'; mPos = 'aboveBar'; }

                          markers.push({
                              time: date,
                              position: mPos,
                              color: mColor,
                              shape: 'circle',
                          });
                      });
                  });

                  markers.sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                  candleSeries.setMarkers(markers);
              }
          } catch (err) {
              console.error("[RsAlpha] 数据加载异常:", err);
          }
      }

      // 6. 点击事件处理
      chart.subscribeClick((param) => {
          if (!param || !param.time) return;

          let clickedDate = param.time;
          if (typeof param.time === 'object' && param.time.year) {
              const y = param.time.year;
              const m = String(param.time.month).padStart(2, '0');
              const d = String(param.time.day).padStart(2, '0');
              clickedDate = `${y}-${m}-${d}`;
          } else if (typeof param.time === 'number') {
              // 兼容 Unix 时间戳，防止时区解析错误
              const dateObj = new Date(param.time * 1000);
              const y = dateObj.getFullYear();
              const m = String(dateObj.getMonth() + 1).padStart(2, '0');
              const d = String(dateObj.getDate()).padStart(2, '0');
              clickedDate = `${y}-${m}-${d}`;
          } else if (typeof param.time === 'string') {
              clickedDate = param.time.substring(0, 10);
          }

          if (dailyOpinions[clickedDate]) {
              let opinions = dailyOpinions[clickedDate];

              // 按情绪排序：看涨在前，看空在后
              opinions.sort((a, b) => b.sentiment - a.sentiment);

              document.getElementById('modalTitle').innerHTML =
                  `${clickedDate} 投研共振详情 <span style="font-size:14px; color:#787b86; font-weight:normal; margin-left:10px;">(共 ${opinions.length} 条观点)</span>`;

              let htmlStr = '';

              opinions.forEach(op => {
                  let borderClass = 'border-neutral';
                  let sentimentText = '<span class="color-neutral">🟡 观望 / 中性</span>';

                  if (op.sentiment === 1) {
                      borderClass = 'border-bull';
                      sentimentText = '<span class="color-bull">🟢 乐观 / 看多</span>';
                  } else if (op.sentiment === -1) {
                      borderClass = 'border-bear';
                      sentimentText = '<span class="color-bear">🔴 悲观 / 看空</span>';
                  }

                  htmlStr += `
                    <div class="opinion-card ${borderClass}">
                        <div class="opinion-header">
                            <span style="font-size:15px;">🎯 <b>${op.user}</b>
                                <span style="color:#787b86;font-size:13px;font-weight:normal;margin-left:5px;">
                                    [${op.horizon}] ${op.time}
                                </span>
                            </span>
                            ${sentimentText}
                        </div>
                        <div style="margin-top: 8px;">${op.content}</div>
                    </div>
                  `;
              });

              document.getElementById('modalBody').innerHTML = htmlStr;
              modal.style.display = "flex";
          }
      });

      document.getElementById('loadBtn').addEventListener('click', loadData);
      document.getElementById('tickerInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') loadData(); });
      window.addEventListener('resize', () => chart.resize(container.clientWidth, container.clientHeight));
      loadData();
  });
</script>
</body>
</html>
