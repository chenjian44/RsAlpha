<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RsAlpha - 投研 K 线复盘系统</title>

  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

  <style>
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background-color: #ffffff; color: #333333; }
    #controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
    #chart-container { width: 100%; height: 600px; border: 1px solid #e0e3eb; border-radius: 4px; position: relative; }
    input { padding: 8px; border-radius: 4px; border: 1px solid #d1d4dc; background: #ffffff; color: #333333; outline: none; }
    input:focus { border-color: #2962ff; }
    button { padding: 8px 16px; background: #2962ff; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1e88e5; }
    .info { color: #787b86; font-size: 14px; margin-left: 10px; }

    #infoModal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); backdrop-filter: blur(2px); align-items: center; justify-content: center; }
    .modal-content { background-color: #ffffff; padding: 24px; border-radius: 12px; width: 550px; max-width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #e0e3eb; }
    .close-btn { color: #999; float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 24px; transition: color 0.2s; }
    .close-btn:hover { color: #333; }
    .modal-date { font-size: 20px; font-weight: 600; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #f0f3fa; padding-bottom: 12px; color: #191919; }

    .opinion-card { padding: 16px; margin-bottom: 16px; border-radius: 8px; background: #f8f9fa; border-left: 4px solid #ccc; font-size: 14px; color: #333; }
    .opinion-card:last-child { margin-bottom: 0; }
    .opinion-header { font-weight: bold; padding-bottom: 10px; margin-bottom: 12px; border-bottom: 1px dashed #d1d4dc; display: flex; justify-content: space-between; align-items: center; }

    .color-bull { color: #26a69a; }
    .color-neutral { color: #fbc02d; }
    .color-bear { color: #ef5350; }

    .border-bull { border-left-color: #26a69a; }
    .border-neutral { border-left-color: #fbc02d; }
    .border-bear { border-left-color: #ef5350; }

    .post-item { margin-bottom: 12px; }
    .post-item:last-child { margin-bottom: 0; }
    .post-meta { font-size: 12px; color: #787b86; margin-bottom: 6px; }
    .post-content { line-height: 1.6; }
  </style>
</head>
<body>

<div id="controls">
  <input type="text" id="tickerInput" placeholder="输入标的代码 (如 SPY)" value="SPY">
  <button id="loadBtn">加载共振数据</button>
  <span class="info">※ K线：红涨绿跌 | 圆点代表发言大V数量 (点击K线查看详情)</span>
</div>

<div id="chart-container"></div>

<div id="infoModal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <h3 class="modal-date" id="modalTitle">日期</h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {

      const container = document.getElementById('chart-container');
      const modal = document.getElementById('infoModal');
      const closeModal = document.getElementById('closeModal');

      let dailyOpinions = {};
      let validTradingDays = [];

      const chart = LightweightCharts.createChart(container, {
          layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#191919' },
          grid: { vertLines: { color: '#f0f3fa' }, horzLines: { color: '#f0f3fa' } },
          timeScale: { borderColor: '#e0e3eb', timeVisible: true },
      });

      const candleSeries = chart.addCandlestickSeries({
          upColor: '#ef5350', downColor: '#26a69a', borderVisible: false, wickUpColor: '#ef5350', wickDownColor: '#26a69a',
      });

      closeModal.onclick = () => modal.style.display = "none";
      window.onclick = (event) => { if (event.target === modal) modal.style.display = "none"; }

      function getClosestTradingDay(targetDateStr) {
          if (!validTradingDays.length) return targetDateStr;
          if (validTradingDays.includes(targetDateStr)) return targetDateStr;

          let closestDate = targetDateStr;
          for (let i = validTradingDays.length - 1; i >= 0; i--) {
              if (validTradingDays[i] <= targetDateStr) {
                  closestDate = validTradingDays[i];
                  break;
              }
          }
          return closestDate;
      }

      async function loadData() {
          const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
          if (!ticker) return;
          dailyOpinions = {};
          validTradingDays = [];

          try {
              // 加载 K线 和 数据
              const kRes = await fetch(`/api/charts/kline?symbol=${ticker}`);
              const kJson = await kRes.json();
              if (kJson.code === 0 && Array.isArray(kJson.data)) {
                  candleSeries.setData(kJson.data);
                  validTradingDays = kJson.data.map(item => {
                      if (typeof item.time === 'string') return item.time;
                      if (typeof item.time === 'object') {
                          return `${item.time.year}-${String(item.time.month).padStart(2, '0')}-${String(item.time.day).padStart(2, '0')}`;
                      }
                      return item.time;
                  });
              }

              const mRes = await fetch(`/api/charts/markers?ticker=${ticker}`);
              const mJson = await mRes.json();

              if (mJson.code === 0 && Array.isArray(mJson.data)) {
                  const markers = [];

                  // 1. 数据清洗入库
                  mJson.data.forEach(item => {
                      const rawTimestamp = item.timestamp || '';
                      const rawDateStr = rawTimestamp.length >= 10 ? rawTimestamp.substring(0, 10) : rawTimestamp;
                      const timeStr = rawTimestamp.includes(' ') ? rawTimestamp.split(' ')[1] : '';

                      const alignDateStr = getClosestTradingDay(rawDateStr);

                      let sentiment = 1;
                      if (item.sentiment_score !== undefined) {
                          sentiment = item.sentiment_score;
                      } else if (item.content) {
                          const contentStr = item.content.toLowerCase();
                          if (contentStr.includes('看跌') || contentStr.includes('看空') || contentStr.includes('风险') || contentStr.includes('减仓')) {
                              sentiment = -1;
                          } else if (contentStr.includes('中性') || contentStr.includes('观望') || contentStr.includes('防守')) {
                              sentiment = 0;
                          } else if (contentStr.includes('看涨') || contentStr.includes('看多') || contentStr.includes('加仓')) {
                              sentiment = 1;
                          }
                      }

                      const cleanUser = (item.user || item.blogger || '分析师').trim();
                      const cleanHorizon = (item.horizon || '未定周期').trim();
                      const cleanContent = (item.content || item.strategy || '').trim();

                      const fingerprint = md5(`${cleanUser}|${cleanContent}`);

                      const newOpinion = {
                          user: cleanUser,
                          horizon: cleanHorizon,
                          content: cleanContent,
                          sentiment: sentiment,
                          originalDate: rawDateStr,
                          time: timeStr,
                          fingerprint: fingerprint
                      };

                      if (!dailyOpinions[alignDateStr]) dailyOpinions[alignDateStr] = [];

                      const isExactDuplicate = dailyOpinions[alignDateStr].some(existing => existing.fingerprint === fingerprint);

                      if (!isExactDuplicate) {
                          dailyOpinions[alignDateStr].push(newOpinion);
                      }
                  });

                  // 💡 2. 核心重构：将打点逻辑从“按帖子”改为“按博主”
                  Object.keys(dailyOpinions).forEach(date => {
                      const opinions = dailyOpinions[date];

                      // 按博主名字将当天的所有帖子分组
                      const bloggerGroups = {};
                      opinions.forEach(op => {
                          if (!bloggerGroups[op.user]) bloggerGroups[op.user] = [];
                          bloggerGroups[op.user].push(op);
                      });

                      // 为每个博主生成【唯一】的一颗圆点
                      Object.keys(bloggerGroups).forEach(bloggerName => {
                          const posts = bloggerGroups[bloggerName];

                          // 综合情绪计算（防守优先）：只要今天该博主有任意一条提示了风险，这颗点就是红色的
                          let aggregateSentiment = 1; // 默认看多
                          if (posts.some(p => p.sentiment === -1)) {
                              aggregateSentiment = -1;
                          } else if (posts.some(p => p.sentiment === 0)) {
                              aggregateSentiment = 0;
                          }

                          let mColor = '#fbc02d';
                          let mPos = 'inBar';
                          if (aggregateSentiment === 1) { mColor = '#26a69a'; mPos = 'belowBar'; }
                          else if (aggregateSentiment === -1) { mColor = '#ef5350'; mPos = 'aboveBar'; }

                          markers.push({
                              time: date,
                              position: mPos,
                              color: mColor,
                              shape: 'circle',
                          });
                      });
                  });

                  markers.sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                  candleSeries.setMarkers(markers);
              }
          } catch (err) {
              console.error("[RsAlpha] 数据加载异常:", err);
          }
      }

      // 点击事件处理
      chart.subscribeClick((param) => {
          if (!param || !param.time) return;

          let clickedDate = param.time;
          if (typeof param.time === 'object' && param.time.year) {
              const y = param.time.year;
              const m = String(param.time.month).padStart(2, '0');
              const d = String(param.time.day).padStart(2, '0');
              clickedDate = `${y}-${m}-${d}`;
          } else if (typeof param.time === 'number') {
              const dateObj = new Date(param.time * 1000);
              const y = dateObj.getFullYear();
              const m = String(dateObj.getMonth() + 1).padStart(2, '0');
              const d = String(dateObj.getDate()).padStart(2, '0');
              clickedDate = `${y}-${m}-${d}`;
          } else if (typeof param.time === 'string') {
              clickedDate = param.time.substring(0, 10);
          }

          if (dailyOpinions[clickedDate]) {
              const opinions = dailyOpinions[clickedDate];

              // 💡 3. 弹窗渲染重构：按博主聚合卡片
              const bloggerGroups = {};
              opinions.forEach(op => {
                  if (!bloggerGroups[op.user]) bloggerGroups[op.user] = [];
                  bloggerGroups[op.user].push(op);
              });

              // 将字典转为数组方便排序渲染
              const groupedArray = Object.keys(bloggerGroups).map(blogger => {
                  const posts = bloggerGroups[blogger];
                  // 计算综合情绪
                  let aggSent = 1;
                  if (posts.some(p => p.sentiment === -1)) aggSent = -1;
                  else if (posts.some(p => p.sentiment === 0)) aggSent = 0;

                  // 内部帖子按时间早晚排序
                  posts.sort((a, b) => (a.originalDate + a.time).localeCompare(b.originalDate + b.time));

                  return { blogger: blogger, sentiment: aggSent, posts: posts };
              });

              // 卡片排序：综合看多(1)在上，综合看空(-1)在下
              groupedArray.sort((a, b) => b.sentiment - a.sentiment);

              // 标题优化展示
              document.getElementById('modalTitle').innerHTML =
                  `${clickedDate} 投研复盘 <span style="font-size:14px; color:#787b86; font-weight:normal; margin-left:10px;">(共 ${groupedArray.length} 位大V发声，累计 ${opinions.length} 条数据)</span>`;

              let htmlStr = '';

              groupedArray.forEach(group => {
                  let borderClass = 'border-neutral';
                  let sentimentText = '<span class="color-neutral">🟡 综合偏中性</span>';

                  if (group.sentiment === 1) {
                      borderClass = 'border-bull';
                      sentimentText = '<span class="color-bull">🟢 综合偏乐观</span>';
                  } else if (group.sentiment === -1) {
                      borderClass = 'border-bear';
                      sentimentText = '<span class="color-bear">🔴 综合提示防守</span>';
                  }

                  htmlStr += `<div class="opinion-card ${borderClass}">`;

                  // 卡片头部（大V名字 + 综合情绪）
                  htmlStr += `
                    <div class="opinion-header">
                        <span style="font-size:16px;">🎯 <b>${group.blogger}</b> <span style="font-size:13px; color:#787b86; font-weight:normal; margin-left:6px;">(${group.posts.length} 条更新)</span></span>
                        ${sentimentText}
                    </div>
                  `;

                  // 卡片身体（循环展示该大V今天发的所有帖子）
                  group.posts.forEach((op, index) => {

                      let singleSent = '🟡 中性';
                      let singleColor = '#fbc02d';
                      if (op.sentiment === 1) { singleSent = '🟢 看多'; singleColor = '#26a69a'; }
                      else if (op.sentiment === -1) { singleSent = '🔴 提示防守'; singleColor = '#ef5350'; }

                      htmlStr += `
                        <div class="post-item">
                            <div class="post-meta">
                                ⏱ ${op.originalDate} ${op.time} &nbsp;|&nbsp; 周期: [${op.horizon}] &nbsp;|&nbsp; <span style="color:${singleColor}">${singleSent}</span>
                            </div>
                            <div class="post-content">${op.content}</div>
                        </div>
                      `;

                      // 如果有多条帖子，中间加个极浅的分割线区隔
                      if (index < group.posts.length - 1) {
                          htmlStr += `<hr style="border: none; border-top: 1px dashed #e0e3eb; margin: 12px 0;">`;
                      }
                  });

                  htmlStr += `</div>`;
              });

              document.getElementById('modalBody').innerHTML = htmlStr;
              modal.style.display = "flex";
          }
      });

      document.getElementById('loadBtn').addEventListener('click', loadData);
      document.getElementById('tickerInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') loadData(); });
      window.addEventListener('resize', () => chart.resize(container.clientWidth, container.clientHeight));
      loadData();
  });
</script>
</body>
</html>
