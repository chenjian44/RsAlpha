# 云雾API配置文件

# API密钥
# 使用环境变量: YUNWU_API_KEY
yunwu.api.key=${YUNWU_API_KEY}

# API地址
# 使用环境变量: YUNWU_API_URL
yunwu.api.url=${YUNWU_API_URL:https://yunwu.ai/v1/chat/completions}

# 模型名称
# 使用环境变量: YUNWU_API_MODEL
yunwu.api.model=${YUNWU_API_MODEL:gemini-3.1-flash-lite-preview}

# 温度参数
# 使用环境变量: YUNWU_API_TEMPERATURE
yunwu.api.temperature=${YUNWU_API_TEMPERATURE:0.0}
